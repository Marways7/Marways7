<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 200" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&amp;family=Orbitron:wght@700;900&amp;display=swap');
      
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-3px); }
      }
      @keyframes scanline {
        0% { transform: translateY(-50px); }
        100% { transform: translateY(200px); }
      }
      @keyframes neonPulse {
        0%, 100% { filter: drop-shadow(0 0 5px rgba(103,232,249,0.5)); }
        50% { filter: drop-shadow(0 0 15px rgba(103,232,249,0.9)); }
      }
      @keyframes blink {
        0%, 96%, 100% { opacity: 1; }
        98% { opacity: 0; }
      }

      .bg { fill: #050814; }
      
      .hud-frame {
        fill: #0D1117;
        stroke: #A78BFA;
        stroke-width: 1.5;
        filter: drop-shadow(0 0 10px rgba(167, 139, 250, 0.2));
      }
      
      .hud-glow {
        fill: none;
        stroke: #06B6D4;
        stroke-width: 2;
        filter: drop-shadow(0 0 8px rgba(6,182,212,0.8));
      }

      .title-font {
        font-family: 'Orbitron', sans-serif;
        font-size: 16px;
        font-weight: 700;
        fill: #67E8F9;
      }
      .desc-font {
        font-family: 'Fira Code', monospace;
        font-size: 12px;
        fill: #C9D1D9;
      }
      .lang-font {
        font-family: 'Fira Code', monospace;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }
      
      .scan-group {
        clip-path: url(#pad-clip);
      }
    </style>
    
    <clipPath id="pad-clip">
      <rect width="370" height="190" x="5" y="5" rx="8" />
    </clipPath>
    
    <linearGradient id="scan-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0" />
      <stop offset="50%" stop-color="#06B6D4" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Deep space background -->
  <rect width="100%" height="100%" class="bg" rx="12" />

  <!-- Data Pad Core Container -->
  <g transform="translate(5, 5)" style="animation: float 5s infinite 2.0999999999999996s ease-in-out;">
    <g class="scan-group">
      <rect width="370" height="190" rx="8" class="hud-frame" />
      <!-- Scanning Line inside Pad -->
      <rect width="100%" height="40" fill="url(#scan-grad)" style="animation: scanline 3.5s infinite linear 2.0999999999999996s;" />
    </g>
    
    <!-- Cybernetic Hud Corner Accents -->
    <path d="M 0 25 L 0 0 L 25 0" class="hud-glow" />
    <path d="M 370 165 L 370 190 L 345 190" class="hud-glow" />
    
    <!-- Decorative side ticks -->
    <rect x="365" y="30" width="8" height="2" fill="#8B5CF6" />
    <rect x="365" y="38" width="8" height="2" fill="#8B5CF6" />
    <rect x="365" y="46" width="8" height="2" fill="#8B5CF6" />
    
    <!-- Repo Icon -->
    <svg x="15" y="20" viewBox="0 0 16 16" width="18" height="18">
      <path fill="#8B5CF6" fill-rule="evenodd" d="M2 2.5A2.5 2.5 0 014.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 110-1.5h1.75v-2h-8a1 1 0 00-.714 1.7.75.75 0 01-1.072 1.05A2.495 2.495 0 012 11.5v-9zm10.5-1V9h-8c-.356 0-.694.074-1 .208V2.5a1 1 0 011-1h8zM5 12.25v3.25a.25.25 0 00.4.2l1.45-1.087a.25.25 0 01.3 0L8.6 15.7a.25.25 0 00.4-.2v-3.25a.25.25 0 00-.25-.25h-3.5a.25.25 0 00-.25.25z"></path>
    </svg>
    
    <!-- Title -->
    <text x="40" y="34" class="title-font" style="animation: neonPulse 3s infinite 2.0999999999999996s;">cua_desktop_operator_skill</text>
    
    <!-- Description -->
    <text x="20" y="70" class="desc-font">Computer Use Automation.</text>
    <text x="20" y="90" class="desc-font">AI operating complete desktop via MCP.</text>
    
    <!-- Status / Metrics Footer -->
    <g transform="translate(0, 160)">
        <!-- Language Circle -->
        <circle cx="25" cy="-4" r="5" fill="#3572A5" style="animation: blink 4s infinite;" />
        <text x="35" y="0" class="lang-font" fill="#3572A5">Python</text>
        
        <!-- Star Icon -->
        <svg x="250" y="-12" viewBox="0 0 16 16" width="14" height="14">
          <path fill="#C9D1D9" fill-rule="evenodd" d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"></path>
        </svg>
        <text x="270" y="0" class="lang-font" fill="#C9D1D9">2</text>
    </g>
  </g>
</svg>
