<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a">
        <animate attributeName="stop-color" values="#0a0a1a;#0d1033;#0a0a1a" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#1a1040">
        <animate attributeName="stop-color" values="#1a1040;#0d2847;#1a1040" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#0a0a1a">
        <animate attributeName="stop-color" values="#0a0a1a;#1a0a2e;#0a0a1a" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glow-ultra">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa">
        <animate attributeName="stop-color" values="#a78bfa;#67e8f9;#c084fc;#a78bfa" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="33%" style="stop-color:#67e8f9">
        <animate attributeName="stop-color" values="#67e8f9;#c084fc;#a78bfa;#67e8f9" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="66%" style="stop-color:#c084fc">
        <animate attributeName="stop-color" values="#c084fc;#a78bfa;#67e8f9;#c084fc" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#818cf8">
        <animate attributeName="stop-color" values="#818cf8;#67e8f9;#c084fc;#818cf8" dur="5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="sub-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#94a3b8">
        <animate attributeName="stop-color" values="#94a3b8;#a78bfa;#94a3b8" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#cbd5e1">
        <animate attributeName="stop-color" values="#cbd5e1;#67e8f9;#cbd5e1" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <radialGradient id="particle-grad">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0"/>
    </radialGradient>

    <linearGradient id="orbit-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#67e8f9;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0"/>
    </linearGradient>

    <linearGradient id="orbit-grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#c084fc;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:0"/>
    </linearGradient>

    <!-- Hexagon clip for avatar area -->
    <clipPath id="hex-clip">
      <polygon points="600,35 640,55 640,95 600,115 560,95 560,55"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg-grad)" rx="0"/>

  <!-- Animated grid lines -->
  <g opacity="0.04">
    <line x1="0" y1="50" x2="1200" y2="50" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="1200" y2="150" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="0" y1="250" x2="1200" y2="250" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="120" y1="0" x2="120" y2="300" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="300" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="360" y1="0" x2="360" y2="300" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="300" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="300" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="300" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="840" y1="0" x2="840" y2="300" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="960" y1="0" x2="960" y2="300" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="1080" y1="0" x2="1080" y2="300" stroke="#a78bfa" stroke-width="0.5"/>
  </g>

  <!-- Floating particles - more of them with various effects -->
  <circle cx="80" cy="60" r="1.8" fill="#a78bfa" filter="url(#glow)" opacity="0.8">
    <animate attributeName="cy" values="60;40;60" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="220" r="1.2" fill="#67e8f9" filter="url(#glow)" opacity="0.6">
    <animate attributeName="cy" values="220;240;220" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="45" r="1" fill="#c084fc" filter="url(#glow)" opacity="0.5">
    <animate attributeName="cy" values="45;60;45" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="265" r="1.5" fill="#818cf8" filter="url(#glow)" opacity="0.4">
    <animate attributeName="cy" values="265;250;265" dur="4.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="550" cy="30" r="1" fill="#67e8f9" filter="url(#glow)" opacity="0.5">
    <animate attributeName="cy" values="30;45;30" dur="3.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="275" r="1.3" fill="#a78bfa" filter="url(#glow)" opacity="0.4">
    <animate attributeName="cy" values="275;260;275" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="50" r="1.5" fill="#c084fc" filter="url(#glow)" opacity="0.6">
    <animate attributeName="cy" values="50;35;50" dur="5.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="80" r="2" fill="#c084fc" filter="url(#glow)" opacity="0.7">
    <animate attributeName="cy" values="80;60;80" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1000" cy="240" r="1.2" fill="#67e8f9" filter="url(#glow)" opacity="0.5">
    <animate attributeName="cy" values="240;220;240" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="130" r="1.8" fill="#818cf8" filter="url(#glow)" opacity="0.6">
    <animate attributeName="cy" values="130;110;130" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="170" r="1" fill="#67e8f9" filter="url(#glow)" opacity="0.3">
    <animate attributeName="cy" values="170;155;170" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1050" cy="60" r="1" fill="#a78bfa" filter="url(#glow)" opacity="0.4">
    <animate attributeName="cy" values="60;75;60" dur="5.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Shooting stars -->
  <line x1="0" y1="0" x2="80" y2="40" stroke="url(#orbit-grad)" stroke-width="1.5" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" values="0;0;0.9;0" dur="7s" repeatCount="indefinite" begin="0s"/>
    <animateTransform attributeName="transform" type="translate" values="100,30;850,200" dur="7s" repeatCount="indefinite" begin="0s"/>
  </line>
  <line x1="0" y1="0" x2="50" y2="25" stroke="url(#orbit-grad2)" stroke-width="1" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" values="0;0;0.7;0" dur="9s" repeatCount="indefinite" begin="3s"/>
    <animateTransform attributeName="transform" type="translate" values="750,15;1200,100" dur="9s" repeatCount="indefinite" begin="3s"/>
  </line>
  <line x1="0" y1="0" x2="60" y2="20" stroke="url(#orbit-grad)" stroke-width="0.8" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" values="0;0;0.5;0" dur="11s" repeatCount="indefinite" begin="6s"/>
    <animateTransform attributeName="transform" type="translate" values="300,10;900,150" dur="11s" repeatCount="indefinite" begin="6s"/>
  </line>

  <!-- Decorative orbit rings -->
  <ellipse cx="120" cy="150" rx="90" ry="35" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.12" transform="rotate(-20 120 150)">
    <animate attributeName="opacity" values="0.12;0.06;0.12" dur="4s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="-20 120 150;-18 120 150;-20 120 150" dur="10s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="1080" cy="150" rx="70" ry="30" fill="none" stroke="#67e8f9" stroke-width="0.5" opacity="0.10" transform="rotate(15 1080 150)">
    <animate attributeName="opacity" values="0.10;0.05;0.10" dur="5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="15 1080 150;17 1080 150;15 1080 150" dur="12s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Code bracket decorations with glow -->
  <text x="310" y="140" font-family="'Fira Code', 'JetBrains Mono', monospace" font-size="55" fill="#a78bfa" opacity="0.2" filter="url(#glow)">&lt;</text>
  <text x="845" y="140" font-family="'Fira Code', 'JetBrains Mono', monospace" font-size="55" fill="#67e8f9" opacity="0.2" filter="url(#glow)">/&gt;</text>

  <!-- Decorative curly braces -->
  <text x="270" y="160" font-family="'Fira Code', monospace" font-size="30" fill="#c084fc" opacity="0.1" filter="url(#glow)">&#123;</text>
  <text x="900" y="160" font-family="'Fira Code', monospace" font-size="30" fill="#c084fc" opacity="0.1" filter="url(#glow)">&#125;</text>

  <!-- Main title with ultra glow -->
  <text x="600" y="118" font-family="'Segoe UI', 'Inter', -apple-system, sans-serif" font-size="72" font-weight="900" fill="url(#text-grad)" text-anchor="middle" filter="url(#glow-ultra)" letter-spacing="12">
    MARWAYS
  </text>

  <!-- Animated underline -->
  <rect x="350" y="135" width="500" height="2" rx="1" fill="url(#text-grad)" opacity="0.6">
    <animate attributeName="width" values="0;500" dur="1.5s" fill="freeze"/>
    <animate attributeName="x" values="600;350" dur="1.5s" fill="freeze"/>
  </rect>

  <!-- Secondary decorative lines -->
  <rect x="380" y="142" width="440" height="0.5" rx="0.25" fill="url(#text-grad)" opacity="0.2">
    <animate attributeName="width" values="0;440" dur="2s" fill="freeze" begin="0.5s"/>
    <animate attributeName="x" values="600;380" dur="2s" fill="freeze" begin="0.5s"/>
  </rect>

  <!-- Subtitle line 1 -->
  <text x="600" y="172" font-family="'Fira Code', 'JetBrains Mono', monospace" font-size="16" fill="url(#sub-grad)" text-anchor="middle" letter-spacing="4" opacity="0.9">
    VIBE CODER  ·  AI ALCHEMIST  ·  FULL-STACK BUILDER
  </text>

  <!-- Subtitle line 2 - code style -->
  <text x="600" y="205" font-family="'Fira Code', 'JetBrains Mono', monospace" font-size="11" fill="#64748b" text-anchor="middle" letter-spacing="1.5">
    const future = (wildIdea) =&gt; AI.transform(wildIdea).deploy();
  </text>

  <!-- Animated cursor blink -->
  <rect x="780" y="194" width="8" height="14" fill="#67e8f9" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Bottom decorative dots with wave animation -->
  <circle cx="540" cy="245" r="3" fill="#a78bfa" opacity="0.5" filter="url(#glow)">
    <animate attributeName="r" values="3;4.5;3" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="565" cy="245" r="3" fill="#818cf8" opacity="0.5" filter="url(#glow)">
    <animate attributeName="r" values="3;4.5;3" dur="2s" repeatCount="indefinite" begin="0.2s"/>
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2s" repeatCount="indefinite" begin="0.2s"/>
  </circle>
  <circle cx="590" cy="245" r="3" fill="#6366f1" opacity="0.5" filter="url(#glow)">
    <animate attributeName="r" values="3;4.5;3" dur="2s" repeatCount="indefinite" begin="0.4s"/>
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
  <circle cx="615" cy="245" r="3" fill="#67e8f9" opacity="0.5" filter="url(#glow)">
    <animate attributeName="r" values="3;4.5;3" dur="2s" repeatCount="indefinite" begin="0.6s"/>
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2s" repeatCount="indefinite" begin="0.6s"/>
  </circle>
  <circle cx="640" cy="245" r="3" fill="#06b6d4" opacity="0.5" filter="url(#glow)">
    <animate attributeName="r" values="3;4.5;3" dur="2s" repeatCount="indefinite" begin="0.8s"/>
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
  <circle cx="665" cy="245" r="3" fill="#c084fc" opacity="0.5" filter="url(#glow)">
    <animate attributeName="r" values="3;4.5;3" dur="2s" repeatCount="indefinite" begin="1.0s"/>
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2s" repeatCount="indefinite" begin="1.0s"/>
  </circle>

  <!-- Bottom gradient fade -->
  <rect x="0" y="280" width="1200" height="20" fill="url(#bg-grad)" opacity="0.5"/>
</svg>
