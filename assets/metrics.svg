<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="m-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#161B22"/>
    </linearGradient>
    <linearGradient id="m-purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <linearGradient id="m-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#67e8f9"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="m-indigo" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="m-pink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <filter id="m-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="800" height="200" rx="16" fill="url(#m-bg)" stroke="#1E293B" stroke-width="1"/>

  <!-- Card 1: Projects -->
  <g transform="translate(40, 30)">
    <rect width="155" height="140" rx="12" fill="#0D1117" stroke="#A78BFA" stroke-width="1" opacity="0.8"/>
    <text x="77" y="45" font-family="'Fira Code', monospace" font-size="11" fill="#94A3B8" text-anchor="middle" letter-spacing="1">PROJECTS</text>
    <text x="77" y="90" font-family="'Inter', sans-serif" font-size="36" fill="url(#m-purple)" text-anchor="middle" font-weight="800" filter="url(#m-glow)">20+</text>
    <text x="77" y="118" font-family="'Fira Code', monospace" font-size="10" fill="#64748B" text-anchor="middle">Open Source Repos</text>
  </g>

  <!-- Card 2: AI Focus -->
  <g transform="translate(225, 30)">
    <rect width="155" height="140" rx="12" fill="#0D1117" stroke="#67E8F9" stroke-width="1" opacity="0.8"/>
    <text x="77" y="45" font-family="'Fira Code', monospace" font-size="11" fill="#94A3B8" text-anchor="middle" letter-spacing="1">AI FOCUS</text>
    <text x="77" y="90" font-family="'Inter', sans-serif" font-size="36" fill="url(#m-cyan)" text-anchor="middle" font-weight="800" filter="url(#m-glow)">65%</text>
    <text x="77" y="118" font-family="'Fira Code', monospace" font-size="10" fill="#64748B" text-anchor="middle">Dev Time on AI</text>
  </g>

  <!-- Card 3: Contributions -->
  <g transform="translate(410, 30)">
    <rect width="155" height="140" rx="12" fill="#0D1117" stroke="#818CF8" stroke-width="1" opacity="0.8"/>
    <text x="77" y="45" font-family="'Fira Code', monospace" font-size="11" fill="#94A3B8" text-anchor="middle" letter-spacing="1">COMMITS</text>
    <text x="77" y="90" font-family="'Inter', sans-serif" font-size="36" fill="url(#m-indigo)" text-anchor="middle" font-weight="800" filter="url(#m-glow)">500+</text>
    <text x="77" y="118" font-family="'Fira Code', monospace" font-size="10" fill="#64748B" text-anchor="middle">Total Contributions</text>
  </g>

  <!-- Card 4: Vibe Coding -->
  <g transform="translate(595, 30)">
    <rect width="155" height="140" rx="12" fill="#0D1117" stroke="#F472B6" stroke-width="1" opacity="0.8"/>
    <text x="77" y="45" font-family="'Fira Code', monospace" font-size="11" fill="#94A3B8" text-anchor="middle" letter-spacing="1">VIBE SINCE</text>
    <text x="77" y="90" font-family="'Inter', sans-serif" font-size="36" fill="url(#m-pink)" text-anchor="middle" font-weight="800" filter="url(#m-glow)">2023</text>
    <text x="77" y="118" font-family="'Fira Code', monospace" font-size="10" fill="#64748B" text-anchor="middle">Coding with AI</text>
  </g>
</svg>
