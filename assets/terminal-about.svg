<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400" viewBox="0 0 900 400">
  <defs>
    <linearGradient id="term-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#161B22"/>
    </linearGradient>
    <linearGradient id="title-bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1B27"/>
      <stop offset="100%" style="stop-color:#13141C"/>
    </linearGradient>
    <filter id="t-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="round-clip">
      <rect x="20" y="15" width="860" height="370" rx="12"/>
    </clipPath>
  </defs>

  <!-- Terminal window -->
  <g filter="url(#shadow)">
    <!-- Window body -->
    <rect x="20" y="15" width="860" height="370" rx="12" fill="url(#term-bg)" stroke="#30363D" stroke-width="1"/>

    <!-- Title bar -->
    <rect x="20" y="15" width="860" height="38" rx="12" fill="url(#title-bar)"/>
    <rect x="20" y="41" width="860" height="12" fill="url(#title-bar)"/>

    <!-- Traffic lights -->
    <circle cx="48" cy="34" r="7" fill="#FF5F57"/>
    <circle cx="72" cy="34" r="7" fill="#FFBD2E"/>
    <circle cx="96" cy="34" r="7" fill="#28CA41"/>

    <!-- Title -->
    <text x="450" y="39" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#8B949E" text-anchor="middle">marways@universe: ~/about-me</text>

    <!-- Scan line effect -->
    <rect x="20" y="15" width="860" height="2" fill="#A78BFA" opacity="0.03" clip-path="url(#round-clip)">
      <animate attributeName="y" values="15;385;15" dur="8s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Terminal content -->
  <g font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="14">
    <!-- Prompt 1 -->
    <text x="45" y="82" fill="#A78BFA" filter="url(#t-glow)">marways</text>
    <text x="120" y="82" fill="#67E8F9">@</text>
    <text x="132" y="82" fill="#818CF8">universe</text>
    <text x="200" y="82" fill="#6B7280">$ </text>
    <text x="215" y="82" fill="#C9D1D9">cat identity.yaml</text>

    <!-- YAML output -->
    <text x="45" y="112" fill="#67E8F9" font-size="13">---</text>

    <text x="45" y="137" fill="#C084FC">name</text><text x="85" y="137" fill="#6B7280">:</text>
    <text x="100" y="137" fill="#A5F3FC">"Marways"</text>

    <text x="45" y="160" fill="#C084FC">title</text><text x="85" y="160" fill="#6B7280">:</text>
    <text x="100" y="160" fill="#A5F3FC">"Vibe Coder · AI Alchemist · Full-Stack Builder"</text>

    <text x="45" y="183" fill="#C084FC">focus</text><text x="85" y="183" fill="#6B7280">:</text>
    <text x="45" y="203" fill="#6B7280">  - </text><text x="72" y="203" fill="#C9D1D9">AI × MCP Desktop Automation Tools</text>
    <text x="45" y="223" fill="#6B7280">  - </text><text x="72" y="223" fill="#C9D1D9">Deep Learning for Biomedical Signals</text>
    <text x="45" y="243" fill="#6B7280">  - </text><text x="72" y="243" fill="#C9D1D9">AiliaoX — Healthcare AI Systems</text>

    <text x="45" y="268" fill="#C084FC">philosophy</text><text x="125" y="268" fill="#6B7280">:</text>
    <text x="140" y="268" fill="#A5F3FC">"用 AI 把天马行空的想法变成现实"</text>

    <text x="45" y="291" fill="#C084FC">specialty</text><text x="120" y="291" fill="#6B7280">:</text>
    <text x="135" y="291" fill="#A5F3FC">"AI agents that operate desktops via MCP"</text>

    <text x="45" y="314" fill="#C084FC">motto</text><text x="85" y="314" fill="#6B7280">:</text>
    <text x="100" y="314" fill="#A5F3FC">"Open source everything! ⭐"</text>

    <!-- Cursor line -->
    <text x="45" y="348" fill="#A78BFA" filter="url(#t-glow)">marways</text>
    <text x="120" y="348" fill="#67E8F9">@</text>
    <text x="132" y="348" fill="#818CF8">universe</text>
    <text x="200" y="348" fill="#6B7280">$ </text>
    <!-- Blinking cursor -->
    <rect x="215" y="336" width="9" height="16" fill="#A78BFA">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Decorative border glow -->
  <rect x="20" y="15" width="860" height="370" rx="12" fill="none" stroke="#A78BFA" stroke-width="0.5" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.1;0.2" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
