<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 118" width="100%" height="auto" role="img" aria-label="ABOUT ME">
  <defs>
    <style>
      @keyframes sweep { 0% { transform:translateX(-260px); opacity:0; } 15% { opacity:1; } 85% { opacity:1; } 100% { transform:translateX(260px); opacity:0; } }
      @keyframes spin { to { transform:rotate(360deg); } }
      @keyframes breathe { 0%,100% { opacity:.45; } 50% { opacity:1; } }
      @keyframes dotTravelL { 0% { transform:translateX(0); opacity:0; } 10% { opacity:1; } 90% { opacity:1; } 100% { transform:translateX(120px); opacity:0; } }
      @keyframes dotTravelR { 0% { transform:translateX(0); opacity:0; } 10% { opacity:1; } 90% { opacity:1; } 100% { transform:translateX(-120px); opacity:0; } }
    </style>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8B5CF6"/><stop offset=".55" stop-color="#06B6D4"/><stop offset="1" stop-color="#EC4899"/></linearGradient>
