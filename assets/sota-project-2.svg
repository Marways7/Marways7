<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 232" width="100%" height="auto" role="img" aria-label="AiliaoX">
  <defs>
    <style>
      @keyframes borderFlow { to { stroke-dashoffset:-320; } }
      @keyframes scanline { 0% { transform:translateY(-60px); } 100% { transform:translateY(252px); } }
      @keyframes cardFloat { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-3px); } }
      @keyframes blinkDot { 0%,88%,100% { opacity:1; } 92%,96% { opacity:.25; } }
      @keyframes chipPulse { 0%,100% { opacity:.75; } 50% { opacity:1; } }
      @keyframes arrowNudge { 0%,100% { transform:translateX(0); } 50% { transform:translateX(3px); } }
      @keyframes trace { to { stroke-dashoffset:-120; } }
      .mono { font-family:ui-monospace,'SFMono-Regular','SF Mono','Cascadia Code','JetBrains Mono',Menlo,Consolas,monospace; }
    </style>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#11182a"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F472B6" stop-opacity="0"/>
      <stop offset=".5" stop-color="#F472B6" stop-opacity=".12"/>
      <stop offset="1" stop-color="#F472B6" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip"><rect x="4" y="4" width="412" height="224" rx="14"/></clipPath>
  </defs>

  <g style="animation:cardFloat 6s ease-in-out 0.55s infinite">
