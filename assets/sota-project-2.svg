    <text x="35" y="84" class="mono" font-size="10.5" letter-spacing="2" fill="#F472B6">HEALTHCARE AI</text>

    <text x="24" y="122" class="mono" font-size="13" fill="#E6EDF3" opacity=".88">Intelligent medical healthcare system.</text>
