      <rect x="4" y="4" width="412" height="224" fill="url(#cardBg)"/>
      <rect x="4" y="0" width="412" height="48" fill="url(#scan)"
        style="animation:scanline 4.5s linear 0.55s infinite"/>
      <path d="M 302 228 v -26 h 44 v -18 h 62" fill="none" stroke="#F472B6"
        stroke-opacity=".28" stroke-width="1.3" stroke-dasharray="7 5"
        style="animation:trace 5s linear infinite"/>
      <circle cx="302" cy="202" r="2.2" fill="#F472B6" opacity=".5"/>
    </g>

    <rect x="4" y="4" width="412" height="224" rx="14" fill="none"
      stroke="#8B5CF6" stroke-opacity=".35" stroke-width="1.3"/>
    <rect x="4" y="4" width="412" height="224" rx="14" fill="none"
      stroke="#F472B6" stroke-width="1.6" stroke-dasharray="46 114" stroke-opacity=".9"
      style="animation:borderFlow 7s linear infinite"/>

    <path d="M 16 34 L 16 16 L 34 16" fill="none" stroke="#F472B6" stroke-width="2.2" opacity=".9"/>
    <path d="M 404 198 L 404 216 L 386 216" fill="none" stroke="#F472B6" stroke-width="2.2" opacity=".9"/>

