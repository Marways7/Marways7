<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Fira+Code:wght@600&amp;display=swap');
      
      .bg { fill: #0D1117; }
      
      .hex-frame {
        fill: rgba(139, 92, 246, 0.05);
        stroke: #A78BFA;
        stroke-width: 2;
        filter: drop-shadow(0 0 10px rgba(167, 139, 250, 0.4));
      }
      .hex-frame:hover {
        fill: rgba(6, 182, 212, 0.1);
        stroke: #06B6D4;
        filter: drop-shadow(0 0 15px rgba(6, 182, 212, 0.8));
      }
      
      .value {
        font-family: 'Orbitron', sans-serif;
        font-size: 34px;
        font-weight: 900;
        fill: #67E8F9;
        text-anchor: middle;
      }
      .label {
        font-family: 'Fira Code', monospace;
        font-size: 14px;
        font-weight: 600;
        fill: #8B949E;
        text-anchor: middle;
      }
      @keyframes float-hex {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }
      
      @keyframes pulse-ring {
        0% { stroke-dasharray: 0 100; opacity: 0.8; }
        100% { stroke-dasharray: 100 0; opacity: 0; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" rx="15" />

  <g style="animation: float-hex 4s infinite 0s ease-in-out; transform-origin: 140px 140px;">
    <polygon points="213.6121593216773,97.5 213.6121593216773,182.5 140.0,225.0 66.3878406783227,182.5 66.38784067832272,97.5 139.99999999999997,55.0" fill="none" class="hex-frame" style="animation: pulse-ring 3s infinite 0s linear;" />
    <polygon points="204.9519052838329,102.5 204.9519052838329,177.5 140.0,215.0 75.0480947161671,177.5 75.0480947161671,102.5 140.0,65.0" class="hex-frame" />
    <text x="140" y="150" class="value">7</text>
    <text x="140" y="180" class="label">TOTAL REPOSITORIES</text>
  </g>

  <g style="animation: float-hex 4s infinite 0.4s ease-in-out; transform-origin: 310px 140px;">
    <polygon points="383.61215932167727,97.5 383.61215932167727,182.5 310.0,225.0 236.3878406783227,182.5 236.38784067832273,97.5 310.0,55.0" fill="none" class="hex-frame" style="animation: pulse-ring 3s infinite 0.4s linear;" />
    <polygon points="374.9519052838329,102.5 374.9519052838329,177.5 310.0,215.0 245.0480947161671,177.5 245.0480947161671,102.5 310.0,65.0" class="hex-frame" />
    <text x="310" y="150" class="value">10</text>
    <text x="310" y="180" class="label">STARS EARNED</text>
  </g>

  <g style="animation: float-hex 4s infinite 0.8s ease-in-out; transform-origin: 480px 140px;">
    <polygon points="553.6121593216773,97.5 553.6121593216773,182.5 480.0,225.0 406.38784067832273,182.5 406.38784067832273,97.5 480.0,55.0" fill="none" class="hex-frame" style="animation: pulse-ring 3s infinite 0.8s linear;" />
    <polygon points="544.951905283833,102.5 544.951905283833,177.5 480.0,215.0 415.0480947161671,177.5 415.0480947161671,102.5 480.0,65.0" class="hex-frame" />
    <text x="480" y="150" class="value">242</text>
    <text x="480" y="180" class="label">CONTRIBUTIONS/YR</text>
  </g>

  <g style="animation: float-hex 4s infinite 1.2s ease-in-out; transform-origin: 650px 140px;">
    <polygon points="723.6121593216773,97.5 723.6121593216773,182.5 650.0,225.0 576.3878406783227,182.5 576.3878406783227,97.5 650.0,55.0" fill="none" class="hex-frame" style="animation: pulse-ring 3s infinite 1.2s linear;" />
    <polygon points="714.951905283833,102.5 714.951905283833,177.5 650.0,215.0 585.048094716167,177.5 585.048094716167,102.5 650.0,65.0" class="hex-frame" />
    <text x="650" y="150" class="value">2023</text>
    <text x="650" y="180" class="label">VIBE SINCE</text>
  </g>
</svg>
