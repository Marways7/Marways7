<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 250" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&amp;family=Orbitron:wght@700;900&amp;display=swap');
      
      .panel {
        fill: #0D1117;
        stroke: #A78BFA;
        stroke-width: 2;
        transition: all 0.5s ease;
      }
      .panel:hover {
        fill: #1A1230;
        stroke: #F472B6;
        filter: drop-shadow(0 0 15px rgba(244,114,182,0.8));
      }
      
      @keyframes pulse-border {
        0% { stroke-opacity: 0.3; }
        50% { stroke-opacity: 1; }
        100% { stroke-opacity: 0.3; }
      }
      
      @keyframes float-up {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }
      
      @keyframes glow-text {
        0%, 100% { filter: drop-shadow(0 0 5px rgba(103,232,249,0.5)); }
        50% { filter: drop-shadow(0 0 15px rgba(103,232,249,0.9)); }
      }
      
      @keyframes radar-spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .title-text {
        font-family: 'Fira Code', monospace;
        font-size: 14px;
        fill: #A78BFA;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      
      .value-text {
        font-family: 'Orbitron', sans-serif;
        font-size: 48px;
        font-weight: 900;
        fill: #67E8F9;
        animation: glow-text 3s infinite;
      }
      
      .sub-text {
        font-family: 'Fira Code', monospace;
        font-size: 12px;
        fill: #8B5CF6;
        opacity: 0.8;
      }
    </style>
    
    <linearGradient id="panel-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.05"/>
    </linearGradient>

    <radialGradient id="ring-grad" cx="50%" cy="50%" r="50%">
      <stop offset="90%" stop-color="transparent" />
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.5" />
    </radialGradient>
  </defs>

  <!-- Background grid for tech feel -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#A78BFA" stroke-width="0.5" stroke-opacity="0.1"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#grid)" />

  <g style="transform-origin: 150px 125px; animation: radar-spin 10s infinite linear reverse;">
    <circle cx="150" cy="125" r="90" fill="url(#ring-grad)" stroke="#06B6D4" stroke-width="1" stroke-dasharray="2 10 20 5" stroke-opacity="0.4" />
    <circle cx="150" cy="125" r="100" fill="none" stroke="#F472B6" stroke-width="0.5" stroke-dasharray="5 50" stroke-opacity="0.3" />
  </g>

  <g style="transform-origin: 450px 125px; animation: radar-spin 12s infinite linear reverse;">
    <circle cx="450" cy="125" r="90" fill="url(#ring-grad)" stroke="#06B6D4" stroke-width="1" stroke-dasharray="2 10 20 5" stroke-opacity="0.4" />
    <circle cx="450" cy="125" r="100" fill="none" stroke="#F472B6" stroke-width="0.5" stroke-dasharray="5 50" stroke-opacity="0.3" />
  </g>

  <g style="transform-origin: 750px 125px; animation: radar-spin 14s infinite linear reverse;">
    <circle cx="750" cy="125" r="90" fill="url(#ring-grad)" stroke="#06B6D4" stroke-width="1" stroke-dasharray="2 10 20 5" stroke-opacity="0.4" />
    <circle cx="750" cy="125" r="100" fill="none" stroke="#F472B6" stroke-width="0.5" stroke-dasharray="5 50" stroke-opacity="0.3" />
  </g>

  <g style="transform-origin: 1050px 125px; animation: radar-spin 16s infinite linear reverse;">
    <circle cx="1050" cy="125" r="90" fill="url(#ring-grad)" stroke="#06B6D4" stroke-width="1" stroke-dasharray="2 10 20 5" stroke-opacity="0.4" />
    <circle cx="1050" cy="125" r="100" fill="none" stroke="#F472B6" stroke-width="0.5" stroke-dasharray="5 50" stroke-opacity="0.3" />
  </g>

  <g style="animation: float-up 4s infinite 0.0s ease-in-out;">
    <path d="M 60,55 L 240,55 L 260,75 L 260,175 L 240,195 L 60,195 L 40,175 L 40,75 Z" fill="url(#panel-grad)" class="panel" style="animation: pulse-border 3s infinite 0.0s;"/>
    
    <!-- Top left corner detail -->
    <path d="M 40,85 L 40,75 L 60,55" fill="none" class="panel" stroke-width="3" style="stroke: #F472B6;" />
    <!-- Bottom right corner detail -->
    <path d="M 260,165 L 260,175 L 240,195" fill="none" class="panel" stroke-width="3" style="stroke: #F472B6;" />

    <text x="150" y="95" text-anchor="middle" class="title-text">PROJECTS</text>
    <text x="150" y="140" text-anchor="middle" class="value-text" style="fill: #F472B6;">20+</text>
    <text x="150" y="170" text-anchor="middle" class="sub-text">Open Source Repos</text>
  </g>

  <g style="animation: float-up 4s infinite 0.2s ease-in-out;">
    <path d="M 360,55 L 540,55 L 560,75 L 560,175 L 540,195 L 360,195 L 340,175 L 340,75 Z" fill="url(#panel-grad)" class="panel" style="animation: pulse-border 3s infinite 0.2s;"/>
    
    <!-- Top left corner detail -->
    <path d="M 340,85 L 340,75 L 360,55" fill="none" class="panel" stroke-width="3" style="stroke: #06B6D4;" />
    <!-- Bottom right corner detail -->
    <path d="M 560,165 L 560,175 L 540,195" fill="none" class="panel" stroke-width="3" style="stroke: #06B6D4;" />

    <text x="450" y="95" text-anchor="middle" class="title-text">AI FOCUS</text>
    <text x="450" y="140" text-anchor="middle" class="value-text" style="fill: #06B6D4;">65%</text>
    <text x="450" y="170" text-anchor="middle" class="sub-text">Dev Time on AI</text>
  </g>

  <g style="animation: float-up 4s infinite 0.4s ease-in-out;">
    <path d="M 660,55 L 840,55 L 860,75 L 860,175 L 840,195 L 660,195 L 640,175 L 640,75 Z" fill="url(#panel-grad)" class="panel" style="animation: pulse-border 3s infinite 0.4s;"/>
    
    <!-- Top left corner detail -->
    <path d="M 640,85 L 640,75 L 660,55" fill="none" class="panel" stroke-width="3" style="stroke: #818CF8;" />
    <!-- Bottom right corner detail -->
    <path d="M 860,165 L 860,175 L 840,195" fill="none" class="panel" stroke-width="3" style="stroke: #818CF8;" />

    <text x="750" y="95" text-anchor="middle" class="title-text">COMMITS</text>
    <text x="750" y="140" text-anchor="middle" class="value-text" style="fill: #818CF8;">500+</text>
    <text x="750" y="170" text-anchor="middle" class="sub-text">Total Contributions</text>
  </g>

  <g style="animation: float-up 4s infinite 0.6000000000000001s ease-in-out;">
    <path d="M 960,55 L 1140,55 L 1160,75 L 1160,175 L 1140,195 L 960,195 L 940,175 L 940,75 Z" fill="url(#panel-grad)" class="panel" style="animation: pulse-border 3s infinite 0.6000000000000001s;"/>
    
    <!-- Top left corner detail -->
    <path d="M 940,85 L 940,75 L 960,55" fill="none" class="panel" stroke-width="3" style="stroke: #F472B6;" />
    <!-- Bottom right corner detail -->
    <path d="M 1160,165 L 1160,175 L 1140,195" fill="none" class="panel" stroke-width="3" style="stroke: #F472B6;" />

    <text x="1050" y="95" text-anchor="middle" class="title-text">VIBE SINCE</text>
    <text x="1050" y="140" text-anchor="middle" class="value-text" style="fill: #F472B6;">2023</text>
    <text x="1050" y="170" text-anchor="middle" class="sub-text">Coding with AI</text>
  </g>
</svg>