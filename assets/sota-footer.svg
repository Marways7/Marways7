<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 250" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&amp;family=Orbitron:wght@700;900&amp;display=swap');
      
      @keyframes neonPulse {
        0%, 100% { filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.5)); }
        50% { filter: drop-shadow(0 0 20px rgba(6, 182, 212, 0.8)); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      @keyframes slideIn {
        0% { transform: translateX(-50px); opacity: 0; }
        100% { transform: translateX(0); opacity: 1; }
      }
      @keyframes codeRain {
        0% { transform: translateY(-50px); opacity: 0; }
        50% { opacity: 0.5; }
        100% { transform: translateY(250px); opacity: 0; }
      }
      
      .text-title {
        font-family: 'Fira Code', monospace;
        font-size: 20px;
        font-weight: 600;
        fill: #A78BFA;
      }
      .text-main {
        font-family: 'Orbitron', sans-serif;
        font-size: 32px;
        font-weight: 900;
        fill: url(#text-grad);
        letter-spacing: 2px;
        animation: neonPulse 3s infinite;
      }
      .text-sub {
        font-family: 'Fira Code', monospace;
        font-size: 14px;
        fill: #C9D1D9;
      }
      .accent {
        fill: #06B6D4;
      }
    </style>
    
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#67E8F9" />
      <stop offset="50%" stop-color="#A78BFA" />
      <stop offset="100%" stop-color="#F472B6" />
    </linearGradient>

    <radialGradient id="hole-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0614" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#1A1230" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>

